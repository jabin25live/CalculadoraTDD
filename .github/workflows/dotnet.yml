name: .NET CI con SonarCloud

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-test-analyze:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del código
      uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '8.0.x'

    - name: Instalar SonarScanner y dotnet-coverage
      run: |
        dotnet tool install --global dotnet-sonarscanner
        dotnet tool install --global dotnet-coverage

    - name: Iniciar análisis de SonarCloud
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      # Forzamos la lectura exacta en la ruta absoluta del espacio de trabajo
      run: dotnet sonarscanner begin /k:"jabin25live_Calculadora" /o:"jabin25live" /d:sonar.token="$SONAR_TOKEN" /d:sonar.host.url="https://sonarcloud.io" /d:sonar.cs.vscoveragexml.reportsPaths="${{ github.workspace }}/coverage.xml"

    - name: Compilar el proyecto
      run: dotnet build --no-incremental

    - name: Ejecutar pruebas y generar cobertura
      # Forzamos la creación del archivo exactamente en la misma ruta absoluta
      run: dotnet-coverage collect "dotnet test" -f xml -o "${{ github.workspace }}/coverage.xml"

    - name: Verificar archivo generado (Debugging)
      # Esto confirmará en los logs de GitHub que el archivo existe y su tamaño
      run: ls -la ${{ github.workspace }}/coverage.xml

    - name: Finalizar análisis y enviar a SonarCloud
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: dotnet sonarscanner end /d:sonar.token="$SONAR_TOKEN"