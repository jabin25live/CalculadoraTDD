name: .NET CI con SonarCloud

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-test-analyze:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del código
      uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '8.0.x'

    - name: Instalar SonarScanner globalmente
      run: dotnet tool install --global dotnet-sonarscanner

    - name: Iniciar análisis de SonarCloud
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      # Corrección: Usamos $SONAR_TOKEN en lugar de ${{ secrets... }}
      run: dotnet sonarscanner begin /k:"jabin25live_Calculadora" /o:"jabin25live" /d:sonar.token="$SONAR_TOKEN" /d:sonar.host.url="https://sonarcloud.io" /d:sonar.cs.opencover.reportsPaths="**/coverage.opencover.xml"

    - name: Compilar el proyecto
      run: dotnet build --no-incremental

    - name: Ejecutar pruebas con recolector nativo
      run: dotnet test --verbosity normal --collect:"XPlat Code Coverage;Format=opencover" --results-directory ./TestResults

    - name: Verificar dónde se guardó el archivo (Debugging)
      run: find . -name "coverage.opencover.xml"

    - name: Finalizar análisis y enviar a SonarCloud
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      # Corrección: Usamos $SONAR_TOKEN aquí también
      run: dotnet sonarscanner end /d:sonar.token="$SONAR_TOKEN"