name: .NET CI con SonarCloud

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-test-analyze:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del código
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Instalar SonarScanner globalmente
      run: dotnet tool install --global dotnet-sonarscanner

    - name: Iniciar análisis de SonarCloud
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      # Usamos el comodín universal ** para que Sonar lo encuentre en cualquier carpeta
      run: dotnet sonarscanner begin /k:"jabin25live_Calculadora" /o:"jabin25live" /d:sonar.token="$SONAR_TOKEN" /d:sonar.host.url="https://sonarcloud.io" /d:sonar.cs.opencover.reportsPaths="**/coverage.opencover.xml"

    - name: Construir y Probar
      # Usamos el comando exacto que te generó el XML localmente (sin el --no-build para que no falle)
      run: dotnet test /p:CollectCoverage=true /p:CoverletOutputFormat=opencover

    - name: Finalizar análisis y enviar a SonarCloud
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: dotnet sonarscanner end /d:sonar.token="$SONAR_TOKEN"