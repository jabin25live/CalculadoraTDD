name: .NET CI con SonarCloud

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-test-analyze:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del código
      uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '8.0.x'

    - name: Instalar SonarScanner globalmente
      run: dotnet tool install --global dotnet-sonarscanner

    # NUEVO: Instalamos la herramienta oficial que pide la documentación
    - name: Instalar dotnet-coverage globalmente
      run: dotnet tool install --global dotnet-coverage

    - name: Iniciar análisis de SonarCloud
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      # Según la documentación, con esta herramienta usamos la propiedad vscoveragexml
      run: dotnet sonarscanner begin /k:"jabin25live_Calculadora" /o:"jabin25live" /d:sonar.token="$SONAR_TOKEN" /d:sonar.host.url="https://sonarcloud.io" /d:sonar.cs.vscoveragexml.reportsPaths="coverage.xml"

    - name: Compilar el proyecto
      run: dotnet build --no-incremental

    # NUEVO: Usamos el comando exacto de la documentación para generar el XML
    - name: Ejecutar pruebas y generar cobertura con dotnet-coverage
      run: dotnet-coverage collect "dotnet test" -f xml -o "coverage.xml"

    - name: Finalizar análisis y enviar a SonarCloud
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: dotnet sonarscanner end /d:sonar.token="$SONAR_TOKEN"